name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build release on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: viddeck
            asset_name: viddeck-linux-amd64
          - os: windows-latest
            artifact_name: viddeck.exe
            asset_name: viddeck-windows-amd64.exe
          - os: macos-latest
            artifact_name: viddeck
            asset_name: viddeck-macos-amd64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release

      - name: Rename binary for upload
        shell: bash
        run: |
          mv target/release/${{ matrix.artifact_name }} target/release/${{ matrix.asset_name }}

      - name: Upload binaries to Release
        uses: softprops/action-gh-release@v2
        with:
          files: target/release/${{ matrix.asset_name }}
          generate_release_notes: true
